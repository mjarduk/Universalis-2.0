pack:
  id: "universalis"
  name: "Universalis"
  version: "2.0.0"

versions:
  minecraft: "1.21.1"
  neoforge: "21.1.228"

builders:
  mrpack:
    include_files:
      - "./config/**"
      - "./icon.png"

default_profile: "full"

profiles:
  base:
    groups:
      - optimizations
      - pretty
      - qol
  server:
    groups:
      - server
  full:
    groups:
      - optimizations_client
      - qol_client
      - pretty_client
